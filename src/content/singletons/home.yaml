  - title: 'Sesiones Eleahora'
    description: >-
      Acompañamiento terapéutico con Meditación + PNL, Terapia Angelical,
      Perlas de Eleahora, Clases de Meditación y Sesión Energética.
    href: '/sesiones'
    arrow: '→'
    external: false
  - title: 'Workshop "Pienso, luego medito"'
    description: >-
      Experiencia team building para grupos y empresas con herramientas
      prácticas para volver al presente que ayudan a regular niveles de estrés
      y a potenciar el rendimiento.
    href: '/workshop-empresas'
    arrow: '→'
    external: false
  - title: 'Meditaciones Guiadas'
    description: 'Escuchar en Insight Timer'
    href: 'insightTimer'
    arrow: '↗'
    external: true
mindfulnessLabel: 'Ciencia & Espíritu'
mindfulnessTitle: 'Mindfulness como camino.'
mindfulnessLead: >-
  La meditación es una herramienta de neuroregulación. El mindfulness es una
  práctica que entrena la mente para volver al momento presente.
mindfulnessBody: >-
  A través de la respiración, la atención plena y la consciencia corporal, el
  sistema nervioso aprende a salir del estado de alerta constante y a encontrar
  un nuevo equilibrio entre el hacer y el ser.
mindfulnessBenefitsTitle: 'Beneficios de practicar mindfulness regularmente:'
mindfulnessBenefits:
  - 'Reducir el estrés y la ansiedad.'
  - 'Mejorar la claridad mental y la concentración.'
  - 'Regular emociones intensas.'
  - 'Dormir mejor.'
  - 'Aumentar la creatividad y la toma de decisiones.'
mindfulnessConclusion: >-
  En un mundo que nos empuja constantemente hacia el ruido y la velocidad, la
  meditación se convierte en una forma de volver a uno mismo.
mindfulnessImage: '/images/sesion_maria_corallo_neima_pidal_161-tiny.webp'
mindfulnessImageAlt: 'Práctica de mindfulness y meditación consciente con Eleahora'
testimonialsTitle: 'Testimonios'
