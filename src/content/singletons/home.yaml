seoTitle: 'Eleahora | Terapia Transpersonal y Meditación en Madrid'
seoDescription: >-
  Eleahora: Terapia Transpersonal, Meditación y Mindfulness con Maria Eleonora
  Corallo. Sesiones individuales, Terapia Angelical, PNL y workshop para
  empresas. Presencial en Madrid y online.
ogTitle: 'Eleahora — Terapia Transpersonal y Meditación'
ogImage: '/images/OG-images-eleahora-02.png'
heroTitle: 'Bienvenido'
heroSubtitle: "Soy la voz que te recuerda que estás aquí.\nEn el presente. Meditación y Terapia Transpersonal.\nMindfulness. Espiritualidad aterrizada."
heroCtaText: 'Estoy aquí para ti'
heroCtaLink: '/sesiones'
heroImage: '/images/home-hero-eleahora-01-tiny.webp'
heroImageAlt: 'Maria Eleonora Corallo, terapeuta transpersonal y guía de meditación de Eleahora'
manifestoLabel: 'Manifiesto'
manifestoTitle: 'Deja que el amor te regule.'
manifestoBody:
  - type: paragraph
    children:
      - text: >-
          Durante años creí que la estructura y lo sutil eran opuestas. Vivía
          entre el deber ser y el anhelo de algo más grande. Hasta que entendí
          que el verdadero milagro ocurre cuando los pies están bien plantados
          en la tierra y el corazón abierto al cielo.
  - type: paragraph
    children:
      - text: >-
          En Eleahora la espiritualidad es aterrizada, no es un escape, es una
          herramienta. Usamos la mente (PNL y Meditación) para traducir el alma
          (Ángeles). Porque tu proceso no necesita ser perfecto, solo necesita
          ser tuyo.
manifestoQuote: >-
  Soy estructura y soy caos. Soy servicio y soy soberanía. Deja que el amor te
  regule. Confía en el proceso.
manifestoImage: '/images/home-manifiesto-eleahora-01-tiny.webp'
manifestoImageAlt: 'Sesión de meditación y terapia transpersonal de Eleahora — Manifiesto'
serviciosTitle: 'Estoy aquí para ti'
