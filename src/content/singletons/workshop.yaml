seoTitle: "Workshop 'Pienso, luego medito' | Mindfulness para Empresas | Eleahora"
seoDescription: >-
  Workshop de mindfulness y meditación para empresas y equipos. Programa
  'Pienso, luego medito' de Eleahora: reduce el estrés, mejora el foco y
  fortalece la cohesión del equipo.
