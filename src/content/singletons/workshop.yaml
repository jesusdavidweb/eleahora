guideName: 'Maria Eleonora Corallo'
guideBio: >-
  Terapeuta transpersonal, guía de meditación y fundadora de Eleahora. Combina
  su carrera de idiomas (La Sorbonne) y su formación en PNL transpersonal,
  Mindfulness y conexión energética para llevar herramientas prácticas de
  neuroregulación al entorno corporativo.
guideSlogan: |-
  Soy La Voz
  QUE TE RECUERDA
  QUE ESTÁS AQUÍ.
guideSloganAriaLabel: 'Slogan'
workshopEyebrow: 'El Workshop'
workshopTitle: 'Creado para transformar cómo los equipos perciben y manejan el estrés.'
workshopDescription: >-
  "Pienso, luego medito" combina ciencia, introspección y técnicas prácticas
  para reconectar con nuestra esencia, regular nuestras emociones y vivir con
  mayor presencia. El workshop guía a los asistentes a través de dinámicas
  envolventes que integran los cinco sentidos y los elementos de la naturaleza
  para cultivar la atención plena. Además, aborda cómo nivelar el cortisol y
  la dopamina, dos hormonas clave en la productividad y el bienestar,
  ofreciendo herramientas como ejercicios de respiración, meditación y
  prácticas creativas. Con un enfoque en la regulación del sistema nervioso,
  este espacio fomenta claridad mental, mejor toma de decisiones y una
  conexión más profunda entre los individuos y sus equipos. Ideal para
  empresas que buscan empoderar a sus colaboradores con recursos para
  enfrentar los desafíos modernos, este workshop es más que una pausa: Es una
  invitación para transformar la manera en que vivimos y trabajamos, con una
  práctica tan esencial como la de volver al presente.
