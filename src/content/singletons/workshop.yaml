heroLabel: 'Workshop para empresas'
heroTitle: 'Pienso, luego medito.'
heroSubtitle: >-
  Una experiencia de mindfulness y meditación diseñada para equipos y
  organizaciones que quieren reducir el estrés y potenciar el rendimiento.
heroImage: '/images/home-hero-eleahora-01-tiny.webp'
introTitle: 'Por qué el mindfulness en la empresa'
introBody:
  - type: paragraph
    children:
      - text: >-
          El estrés laboral es una de las principales causas de baja
          productividad y rotación de talento. Las prácticas de mindfulness
          ofrecen herramientas concretas y medibles para que los equipos
          trabajen desde un estado de mayor claridad, foco y cohesión.
  - type: paragraph
    children:
      - text: >-
          No se trata de yoga corporativo. Se trata de dotarte de herramientas
          neurocientíficamente validadas para que tu equipo rinda mejor, se
          comunique mejor y se sienta mejor.
benefitsTitle: '¿Qué se llevan los equipos?'
benefits:
  - title: 'Reducción del estrés'
    description: >-
      Técnicas prácticas de regulación del sistema nervioso aplicables
      en el día a día laboral.
  - title: 'Foco y productividad'
    description: >-
      Entrenamiento atencional para trabajar con más presencia y menos
      multitarea reactiva.
  - title: 'Cohesión de equipo'
    description: >-
      Experiencias compartidas que refuerzan la comunicación y la
      escucha activa entre miembros del equipo.
  - title: 'Bienestar sostenible'
    description: >-
      Herramientas que el equipo puede seguir usando de forma autónoma
      después del workshop.
formatsTitle: 'Formatos disponibles'
formats:
  - name: 'Sesión única'
    duration: '90 min'
    description: >-
      Una experiencia de introducción al mindfulness para equipos. Ideal
      como actividad puntual de bienestar o team building.
  - name: 'Programa de 4 sesiones'
    duration: '4 × 60 min'
    description: >-
      Un programa progresivo que construye hábitos de presencia en el
      equipo a lo largo de un mes.
  - name: 'Formato personalizado'
    duration: 'A medida'
    description: >-
      Diseñamos juntos un programa adaptado a los objetivos, el tamaño
      del equipo y la cultura de tu empresa.
ctaTitle: '¿Hablamos para tu empresa?'
ctaBody: >-
  Cuéntame quiénes sois y qué necesitáis. Preparamos una propuesta
  personalizada sin compromiso.
ctaButtonText: 'Solicitar información'
