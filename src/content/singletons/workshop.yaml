testimonialsTitle: 'Lo que ocurre cuando la pausa también es parte del proceso.'
testimonials:
  - name: 'María Aristeguieta'
    role: 'Talent Processes Senior Specialist at Avature, Spain'
    quote: >-
      El profesionalismo y la calma de María marcan una verdadera diferencia.
      Practicar meditación después de su taller me ha ayudado muchísimo a ser
      más productiva y a ordenar mis prioridades con mayor claridad. También
      noto una mejor gestión del estrés en momentos de presión.
  - name: 'Vanessa Fernández'
    role: 'Senior Product Manager at Giftify, Belgium'
    quote: >-
      ¡Ojalá todos pudieran asistir a este workshop! Fue increíblemente valioso
      experimentar el mindfulness y llevarnos herramientas concretas para
      aplicar en el trabajo. Salimos con más presencia, mejor escucha y una
      energía de equipo mucho más conectada. ¡Tu workshop es oro puro!
  - name: 'Stella Camacho'
    role: 'Founder & Chief Creative Officer at Amorchi House'
    quote: >-
      Gracias, Maria, por enseñarme que la pausa también es parte del proceso.
      Tu workshop me recordó que regularnos no es frenar, sino crear espacio
      para decidir mejor y colaborar con más empatía. Es una experiencia que
      realmente transforma la forma de vivir el día a día laboral.
