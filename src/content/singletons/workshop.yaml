guideEyebrow: 'Sobre la guía'
guideName: 'Maria Eleonora Corallo'
guideBio: >-
  Terapeuta transpersonal, guía de meditación y fundadora de Eleahora. Combina
  su carrera de idiomas, PNL transpersonal, mindfulness y conexión energética
  para llevar herramientas prácticas de neuroregulación al entorno corporativo.
guideSlogan: 'Soy la voz que te recuerda que estás aquí.'
workshopEyebrow: 'El workshop'
workshopTitle: 'Pienso, luego medito.'
workshopDescription: >-
  Una experiencia de mindfulness y meditación diseñada para equipos y
  organizaciones que quieren reducir el estrés y potenciar el rendimiento.
experienceEyebrow: '¿Qué incluye la experiencia?'
experienceTitle: 'Un recorrido práctico, consciente y aplicable.'
experienceItems:
  - title: "Bienvenida y aterrizaje consciente"
    description: >-
      Apertura del espacio, intención compartida y práctica breve para llegar al aquí y ahora como equipo.
  - title: "¿Cómo estar más presentes?"
    description: >-
      Prácticas conscientes que integran los sentidos y los elementos.
  - title: "Meditación como método de neuroregulación"
    description: >-
      Sistema nervioso, dopamina y cortisol.
  - title: "Meditación en todas sus formas"
    description: >-
      Con el cuerpo, la mente y el alma.
  - title: "Niño Interior"
    description: >-
      Dinámicas lúdicas que despiertan la creatividad y la alegría.
  - title: "¿Y ahora qué?"
    description: >-
      Acciones concretas para aplicar en el día a día.

benefitsEyebrow: '¿Qué te llevas como empresa?'
benefitsTitle: "Lo que cambia después de la experiencia."
benefits:
  - title: 'Regulación del sistema nervioso'
    description: 'Herramientas prácticas para gestionar el estrés en el entorno laboral.'
  - title: 'Mejora del foco y la concentración'
    description: 'Técnicas de atención plena aplicadas al rendimiento profesional.'
  - title: 'Cohesión de equipo'
    description: 'Una experiencia compartida que fortalece los vínculos y la comunicación.'
  - title: 'Reducción del absentismo'
    description: >-
      El bienestar emocional es una inversión que impacta directamente en la
      productividad y la retención del talento.
formatsEyebrow: 'Formatos'
formatsTitle: 'Formatos disponibles'
formats:
  - name: 'Sesión única'
    duration: '90 min'
    description: 'Introducción al mindfulness con práctica guiada. Ideal para eventos o team days.'
  - name: 'Taller de medio día'
    duration: '3-4 horas'
    description: 'Teoría + práctica + meditaciones guiadas. Incluye material de apoyo.'
  - name: 'Programa mensual'
    duration: '4 sesiones'
    description: 'Un mes de acompañamiento con sesiones semanales para consolidar el hábito.'
testimonialsTitle: 'Lo que ocurre cuando la pausa también es parte del proceso.'
testimonials: []
closingQuote: >-
  El verdadero reto de la condición humana no es estar presente, sino darnos
  cuenta de que no estamos presentes.
closingQuoteAuthor: 'Meggan Watterson'
