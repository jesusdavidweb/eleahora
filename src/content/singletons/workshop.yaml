  - name: 'Taller de medio día'
    duration: '3-4 horas'
    description: 'Teoría + práctica + meditaciones guiadas. Incluye material de apoyo.'
  - name: 'Programa mensual'
    duration: '4 sesiones'
    description: 'Un mes de acompañamiento con sesiones semanales para consolidar el hábito.'
ctaTitle: '¿Hablamos para tu empresa?'
ctaBody: 'Cuéntame el tamaño de tu equipo y qué necesitáis, y diseñamos juntos la experiencia perfecta.'
ctaButtonText: 'Solicitar información'
