heroLabel: "Sobre Mi"
heroTitle: "Soy quien soy y eso es suficiente."
heroSubtitle: >-
  Un espacio de espiritualidad aterrizada para vivir con más presencia.

recorridoLabel: "Mi recorrido"
recorridoTitle: "Tengo un sueño: llevar la meditación a personas que aún no saben que la necesitan."
bioIntro: >-
  Nací en Venezuela, en una familia de raíces italianas donde el amor, la expresión y la fuerza emocional eran el lenguaje cotidiano. Crecí entre culturas, entre mundos, aprendiendo desde pequeña que la identidad no es un lugar fijo — es un viaje.

eleahoraLabel: "Así nació Eleahora"
eleahoraTitle: "Un espacio de espiritualidad aterrizada para vivir con más presencia."

manifestoTitle: "Mi manifiesto"
manifestoText: >-
  Creo en la meditación como acto de amor propio. Creo en la vulnerabilidad como fortaleza. Creo que sanar no es llegar a un destino — es aprender a caminar con presencia.

ctaTitle: "Te acompaño a volver a conectar con el presente. Bienvenidos"
ctaBody: >-
  Da el primer paso. Estoy aquí para acompañarte en tu proceso de sanación y crecimiento personal.
ctaButtonText: "Estoy aquí para tí"
ctaButtonLink: "/sesiones"
