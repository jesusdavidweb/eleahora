seoTitle: 'Sobre Mí — Maria Eleonora Corallo | Eleahora'
seoDescription: >-
  Conoce la historia de Maria Eleonora Corallo, fundadora de Eleahora: de lo
  corporativo en París al acompañamiento terapéutico con Meditación, PNL
  Transpersonal y conexión espiritual en Madrid.
