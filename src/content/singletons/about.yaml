heroLabel: 'Sobre mí'
heroTitle: 'Soy quien soy y eso es suficiente.'
heroSubtitle: 'Terapeuta Transpersonal · Guía de Meditación · PNL'
profileImage: '/images/about-eleahora-001.webp'
bioIntro: ''
bioBody:
  - type: paragraph
    children:
      - text: >-
          Nací en Venezuela, en una familia italiana, y desde muy joven mi vida
          ha estado marcada por el movimiento: distintos países, idiomas y
          culturas. Durante años seguí un camino más estructurado: estudié
          idiomas y comercio internacional en París y trabajé en entornos
          corporativos.
  - type: paragraph
    children:
      - text: 'Pero algo dentro de mí siempre quería ir más allá.'
  - type: paragraph
    children:
      - text: >-
          Hace unos años tomé una decisión que cambió mi rumbo: mudarme a
          Madrid y empezar un viaje mucho más profundo. Mientras estudiaba y
          me formaba, también me estaba transformando.
  - type: paragraph
    children:
      - text: >-
          En ese camino encontré —o recordé— algo que siempre había estado
          en mí: la capacidad de acompañar procesos internos, de escuchar con
          profundidad y de abrir espacios de consciencia.
  - type: paragraph
    children:
      - text: 'La meditación se convirtió en mi herramienta más práctica y poderosa.'
  - type: paragraph
    children:
      - text: >-
          Un lugar donde volver a mí misma, entender mi mente, regular mis
          emociones y conectar con Dios.
  - type: paragraph
    children:
      - text: >-
          Con el tiempo, diferentes herramientas fueron sumándose a este
          camino: la Programación Neurolinguìstica transpersonal, el trabajo
          energético y la conexión espiritual. No como conceptos abstractos,
          sino como herramientas muy prácticas para vivir con más presencia,
          claridad y coherencia.
manifestoTitle: 'Así nació Eleahora'
manifestoText: >-
  Hoy acompaño a personas que sienten que algo dentro de ellas quiere moverse,
  ordenarse o simplemente respirar un poco más profundo. Trabajo a través de
  sesiones individuales de terapia, experiencias de meditación y espacios
  conscientes, y workshops y programas para empresas. Porque creo profundamente
  que estamos viviendo un momento de cambio colectivo donde la consciencia, la
  presencia y la conexión interior ya no son un lujo, sino una necesidad.
galleryImage1: '/images/about-desktop-2.webp'
galleryImage2: '/images/about-eleahora-002.webp'
ctaTitle: 'Te acompaño a volver a conectar con el presente. Bienvenidos'
ctaBody: >-
  Si algo de lo que has leído resuena contigo, me encantaría acompañarte en
  tu proceso.
ctaButtonText: 'Estoy aquí para ti'
