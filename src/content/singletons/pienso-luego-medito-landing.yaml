testimonialsEyebrow: 'Testimonios: Quienes han vivido la experiencia'
testimonials:
  - name: 'María Aristeguieta'
    role: 'Talent Processes Senior Specialist at Avature, Spain'
    quote: >-
      El profesionalismo y la calma de María marcan una verdadera diferencia.
      Practicar meditación después de su taller me ha ayudado muchísimo a ser más
      productiva y a no dejar que el estrés controle todo lo que hago. Recomiendo
      totalmente a cualquiera que trabaje en un entorno acelerado que conozca a
      Maria, ¡es realmente increíble!
  - name: 'Vanessa Fernández'
    role: 'Senior Product Manager at Giftify, Belgium'
    quote: >-
      ¡Ojalá todos pudieran asistir a este workshop! Fue increíblemente valioso
      experimentar el mindfulness, especialmente con todo el estrés diario que
      enfrentamos. Me hace reflexionar: ¿cuán transformadora podría ser una
      empresa si todo el equipo adoptara estas prácticas de mindfulness?
      ¡Gracias, María! ¡Tu workshop es oro puro!
  - name: 'Stella Camacho'
    role: 'Founder & Chief Creative Officer at Amorchi House'
    quote: >-
      Los creativos vivimos en mil dimensiones a la vez: el brief, la idea, la
      ejecución, el deadline, el café que dejamos enfriar. Pero este workshop me
      recordó que la mejor creatividad nace cuando estamos presentes. Gracias,
      Maria, por enseñarme que la pausa también es parte del proceso. Tu workshop
      es un regalo para el mundo.
