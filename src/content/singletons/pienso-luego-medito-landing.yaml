stepsTitle: 'Los 6 Pasos'
steps:
  - title: 'Recuerda que estás aquí'
    description: >-
      Una invitación a detenernos, observar y sentir el momento presente. En un
      mundo acelerado, Eleahora guía a los participantes a reconectar con su
      cuerpo, mente y entorno para redescubrir el poder del "ahora".
  - title: '¿Cómo podemos estar más presentes?'
    description: >-
      A través de prácticas conscientes que integran los sentidos y los
      elementos, este espacio explora herramientas simples pero transformadoras
      para cultivar atención plena y vivir con mayor conexión.
  - title: 'Meditar como método de neuroregulación'
    description: >-
      La meditación es una poderosa herramienta que nos ayuda a regular nuestro
      sistema nervioso. Aprenderemos más sobre el sistema nervioso, la dopamina
      y el cortisol y sobre cómo producir estas hormonas en exceso se ha
      convertido en uno de los retos de la sociedad actual.
  - title: 'La meditación en todas sus formas'
    description: >-
      Eleahora enseña técnicas accesibles y efectivas que se adaptan a
      diferentes necesidades y estilos de vida, meditando con el cuerpo, la mente
      y el alma.
  - title: 'Niño Interior'
    description: >-
      "He llegado por fin a lo que quería ser de mayor: un niño." - Joseph
      Heller. Con esta reflexión, Eleahora recuerda la importancia de volver a la
      esencia de la alegría, la creatividad y el asombro que habita en cada uno
      de nosotros. El workshop incluye dinámicas lúdicas que despiertan a
      nuestro niño interior.
  - title: '¿Y ahora qué?'
    description: >-
      Un cierre intencional que motiva a los participantes a llevar lo aprendido
      más allá del workshop, incorporando pequeñas acciones conscientes en su día
      a día para vivir con mayor presencia.
