profileName: 'Maria Eleonora Corallo'
profileBio: >-
  Terapeuta transpersonal, guía de meditación y fundadora de su marca Eleahora
  en la que combina su carrera de idiomas en La Sorbonne, París, y su pasión por
  el desarrollo personal para llevar la meditación al mundo empresarial en
  diferentes países e idiomas (español, inglés, francés e italiano).

  Su workshop "Pienso, luego medito", nacido en Madrid, invita a conectar con la
  presencia plena y descubrir herramientas prácticas para el bienestar emocional
  y profesional.

  Con años de formación en PNL transpersonal, Mindfulness y conexión energética,
  Eleahora ha transformado su experiencia en un proyecto que guía a personas y
  equipos hacia la calma, la creatividad y el equilibrio.

  Su misión es clara: hacer posible la meditación incluso para quienes aún no
  saben que la necesitan, ayudando a empresas a afrontar los retos modernos con
  conciencia y propósito.

  A través de workshops en diferentes formatos, conferencias y eventos
  conscientes, Maria fomenta un cambio profundo que impulsa tanto el rendimiento
  laboral como el bienestar colectivo, contribuyendo a una transformación
  necesaria para el futuro.
slogan: 'SOY LA VOZ QUE TE RECUERDA QUE ESTÁS AQUÍ.'
sloganAriaLabel: 'Slogan Eleahora'
storyEyebrow: 'Descripción del Workshop'
storyTitle: '¿Cómo inició el viaje?'
storyBody: >-
  Creado por Eleahora, terapeuta transpersonal y guía de meditación, este
  workshop está diseñado para transformar cómo los equipos perciben y manejan el
  estrés, la desconexión y los retos del día a día.

  Inspirado en la premisa de que meditar es una forma de existir, "Pienso, luego
  medito" combina ciencia, introspección y técnicas prácticas para ayudar a los
  participantes a reconectar con su esencia, regular sus emociones y vivir con
  mayor presencia.

  El workshop guía a los asistentes a través de dinámicas envolventes que
  integran los cinco sentidos y los elementos de la naturaleza para cultivar la
  atención plena. Además, aborda cómo nivelar el cortisol y la dopamina, dos
  hormonas clave en la productividad y el bienestar, ofreciendo herramientas
  como ejercicios de respiración, meditación y prácticas creativas.

  Con un enfoque en la regulación del sistema nervioso, este espacio fomenta
  claridad mental, mejor toma de decisiones y una conexión más profunda entre
  los individuos y sus equipos.

  Ideal para empresas que buscan empoderar a sus colaboradores con recursos para
  enfrentar los desafíos modernos, este workshop es más que una pausa: Es una
  invitación para transformar la manera en que vivimos y trabajamos, con una
  práctica tan esencial como la de volver al presente.
