heroTitle: 'Este puede ser el primer paso para volver a ti.'
heroSubtitle: >-
  Hablemos. / Estoy aquí para escucharte y acompañarte en el primer paso.
processTitle: '¿Cómo funciona?'
processSteps:
  - step: '1'
    title: 'Recibo tu mensaje'
    description: >-
      Reviso tu intención y te respondo en máximo 24 horas laborables.
  - step: '2'
    title: 'Elegimos el formato'
    description: >-
      Definimos si te conviene llamada, sesión puntual o acompañamiento mensual.
  - step: '3'
    title: 'Comenzamos'
    description: >-
      Te comparto enlace, horario y recomendaciones para tu primera sesión.
