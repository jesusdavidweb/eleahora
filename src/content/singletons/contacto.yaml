heroTitle: "Este puede ser el primer paso para volver a ti."
heroSubtitle: >-
  Escribe a Eleahora para iniciar tu proceso. Te responderé en menos de 24 horas.

processTitle: "Un proceso claro, humano y sin prisa."
processSteps:
  - step: "1"
    title: "Recibo tu mensaje"
    description: >-
      Te responderé en un máximo de 24 horas laborables para conocernos y entender qué necesitas.
  - step: "2"
    title: "Elegimos el formato"
    description: >-
      Juntos decidimos qué sesión es la más adecuada para ti: online, presencial o un proceso más profundo.
  - step: "3"
    title: "Comenzamos"
    description: >-
      Damos el primer paso. Sin prisa, sin presión. A tu ritmo y con toda la presencia del mundo.
