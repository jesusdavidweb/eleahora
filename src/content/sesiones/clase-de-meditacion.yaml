descriptionText: |-
  Clase teórico-práctica para comprender cómo funciona tu sistema nervioso y cómo regularlo puede ayudarte a volver al presente.

  Aprenderás herramientas concretas de neurorregulación que podrás aplicar en tu día a día, y terminaremos con una meditación guiada que te permitirá experimentar la diferencia entre cómo llegaste y cómo te vas.

  Mi intención con esta sesión es que te lleves la práctica y lo aprendido a tu cotidianidad.
