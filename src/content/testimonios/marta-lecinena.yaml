name: "Marta Leciñena"
quote: |-
  En este mundo que habitamos está muy de moda la desconexión: digital, de las ciudades… y nos olvidamos de lo más importante: la conexión con nosotros mismos. Y eso es lo que haces con Maria. Una de las personas más especiales que conozco. Y como tal te recibe y te hace sentir.

  Un ratito con María es "el spa para el alma" que todos necesitamos.

  Tengas un objetivo que quieras trabajar o simplemente un ratito para ti, Maria es, sin duda, "la persona".
