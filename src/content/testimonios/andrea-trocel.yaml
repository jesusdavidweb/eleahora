name: "Andrea Trocel"
quote: |-
  Mi experiencia con Maria Eleonora ha sido un viaje profundamente transformador en mi camino espiritual. Llegué buscando sostén en un momento de despertar interior, y encontré un espacio seguro, amoroso y lleno de luz donde pude abrirme, explorar y recordar partes de mí que estaban esperando ser escuchadas.

  Las meditaciones guiadas son un capítulo aparte: sublimes, profundas y llenas de una ternura que sostiene. Maria Eleonora tiene la capacidad de llevarnos a lo más profundo de nuestro ser, invitándonos a explorar lo sagrado desde la calma, la presencia y una guía que se siente verdaderamente luminosa.
