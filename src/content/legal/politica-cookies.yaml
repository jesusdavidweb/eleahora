title: "politica-cookies"
metaDescription: "Política de cookies de Eleahora. Información sobre las cookies utilizadas en este sitio web."
lastUpdated: "2025-01-01"
content: >-
  **¿Qué son las cookies?**

  Las cookies son pequeños archivos de texto que se almacenan en tu dispositivo cuando visitas un sitio web. Se utilizan ampliamente para hacer que los sitios web funcionen de manera más eficiente y para proporcionar información a los propietarios del sitio.

  **Cookies que utilizamos**

  Este sitio web utiliza únicamente cookies técnicas necesarias para el funcionamiento básico del sitio. No utilizamos cookies de seguimiento, publicidad o análisis de terceros.

  **Gestión de cookies**

  Puedes configurar tu navegador para que rechace todas las cookies o para que te avise cuando se envíe una cookie. Sin embargo, si bloqueas las cookies, es posible que algunas partes del sitio no funcionen correctamente.

  **Más información**

  Si tienes alguna pregunta sobre nuestra política de cookies, puedes contactarnos en info@eleahora.com.
