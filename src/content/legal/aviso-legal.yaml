  <h2>4. Condiciones de uso del sitio web</h2>

  <p>El usuario se obliga a hacer un uso adecuado, lícito y diligente del sitio
  web, de conformidad con la ley, la moral, el orden público y las presentes
  condiciones. En particular, el usuario se compromete a:</p>

  <ul>
    <li>Hacer un uso lícito, diligente y responsable del sitio web y de sus contenidos y servicios, absteniéndose de emplearlos para actividades ilícitas o contrarias a la buena fe.</li>
    <li>No utilizar el sitio web para fines ilícitos, contrarios a la buena fe, al orden público, a los derechos de terceros o que puedan lesionar de cualquier forma los intereses de Eleahora.</li>
    <li>No introducir o difundir virus informáticos, malware, gusanos, troyanos o cualquier otro sistema que pueda dañar, sobrecargar, deteriorar o impedir la normal utilización del sitio web, los sistemas de terceros o las redes.</li>
    <li>No suprimir, alterar, eludir o manipular cualquier mecanismo de seguridad, sistemas de protección, avisos legales o dispositivos técnicos implementados en el sitio web.</li>
    <li>No realizar actividades que puedan constituir una infracción de derechos de propiedad intelectual o industrial de terceros.</li>
    <li>No intentar acceder a áreas restringidas del sitio web o a sistemas informáticos de Eleahora sin la debida autorización.</li>
    <li>No utilizar el sitio web para enviar comunicaciones no solicitadas (spam) o realizar publicidad no autorizada.</li>
    <li>Proporcionar información veraz, exacta y completa en los formularios de contacto, solicitud de servicios o cualquier otro medio de comunicación habilitado en el sitio web, así como mantener dicha información actualizada.</li>
    <li>No suplantar la identidad de otros usuarios o de terceros.</li>
  </ul>

  <p>El incumplimiento de cualquiera de estas obligaciones podrá dar lugar a la
  denegación del acceso al sitio web, así como al ejercicio de las acciones
  legales que correspondan.</p>


  <h2>5. Exoneración de responsabilidad</h2>

  <p>Eleahora no se hace responsable de los daños o perjuicios de cualquier
