  <p><strong>NIF / NIE:</strong> [A CONSULTAR]</p>

  <p><strong>Domicilio social:</strong> [A CONSULTAR] — Madrid, España</p>

  <p><strong>Correo electrónico:</strong> info@eleahora.com</p>

  <p><strong>Teléfono / WhatsApp:</strong> +34 605 37 37 82</p>

  <p><strong>Sitio web:</strong> https://eleahora.com</p>

  <p><strong>Actividad profesional:</strong> Terapia transpersonal,
  acompañamiento terapéutico con PNL, meditación guiada, sesiones energéticas,
  talleres de mindfulness y desarrollo personal.</p>


  <h2>2. Objeto y ámbito de aplicación</h2>

  <p>El presente Aviso Legal regula el acceso, navegación y uso del sitio web
  eleahora.com (en adelante, «el sitio web»), así como las responsabilidades
  derivadas de su utilización.</p>

  <p>La navegación por el sitio web atribuye la condición de «usuario» e implica
  la aceptación plena y sin reservas de todas y cada una de las disposiciones
  incluidas en este Aviso Legal, así como en la Política de Privacidad y la
  Política de Cookies. En caso de no estar de acuerdo, el usuario deberá
  abstenerse de utilizar el sitio web.</p>

  <p>Eleahora se reserva el derecho a modificar esta información en cualquier
  momento y sin previo aviso, por lo que se recomienda al usuario revisar este
  Aviso Legal periódicamente para estar informado de los cambios. La publicación
  de las modificaciones en el sitio web surtirá efectos desde el momento de su
  publicación.</p>

  <p>El sitio web se dirige exclusivamente a mayores de 18 años. Al acceder y
  utilizar este sitio web, el usuario declara ser mayor de edad.</p>


  <h2>3. Propiedad intelectual e industrial</h2>

  <p>Todos los contenidos del sitio web —incluyendo, a título enunciativo pero
