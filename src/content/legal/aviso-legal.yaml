    <li>Errores o virus informáticos que pudieran transmitirse a través del sitio web debido a la acción de terceros.</li>
    <li>La falta de actualización, veracidad, exactitud o integridad de los contenidos publicados por terceros.</li>
    <li>Usos indebidos o no autorizados del sitio web por parte del usuario.</li>
  </ul>


  <h2>6. Naturaleza de los servicios y disclaimer profesional</h2>

  <p>Los contenidos publicados en este sitio web tienen carácter meramente
  informativo y divulgativo en el ámbito del bienestar emocional, la meditación,
  la atención plena (mindfulness), el desarrollo personal y la terapia
  transpersonal.</p>

  <p>Los servicios ofrecidos por Eleahora —incluyendo el acompañamiento
  terapéutico con PNL, la terapia angelical, las sesiones energéticas, las
  perlas de Eleahora y las clases de meditación— son servicios de acompañamiento
  y desarrollo personal. En ningún caso constituyen ni sustituyen:</p>

  <ul>
    <li>El consejo, diagnóstico o tratamiento de un profesional de la salud mental colegiado (psicólogo clínico, psiquiatra o médico).</li>
    <li>La atención psicológica o psicoterapéutica regulada por los colegios oficiales de psicólogos.</li>
    <li>El diagnóstico, tratamiento o cura de enfermedades físicas o mentales.</li>
    <li>La prescripción de medicamentos o cualquier otra intervención médica.</li>
  </ul>

  <p>Si el usuario requiere atención psicológica, psiquiátrica o médica, debe
  acudir al profesional sanitario colegiado correspondiente. Eleahora no se hace
  responsable del uso que el usuario haga de los contenidos o servicios
  ofrecidos en el sitio web.</p>


  <h2>7. Enlaces a terceros</h2>

  <p>Este sitio web puede incluir enlaces o hipervínculos a sitios web de
  terceros, como Instagram, LinkedIn, Insight Timer, Zoom, Cal.com, WhatsApp y
  Facebook. Estos enlaces se proporcionan únicamente para facilitar el acceso a
  información o servicios complementarios.</p>

  <p>Eleahora no tiene control sobre el contenido, políticas de privacidad,
  prácticas de seguridad o condiciones de uso de dichos sitios web de terceros.
  Eleahora no asume responsabilidad alguna por los daños o perjuicios que
  pudieran derivarse del acceso o uso de los mismos. Se recomienda al usuario
  leer atentamente las condiciones de uso y políticas de privacidad de cada
  sitio web de terceros que visite.</p>


  <h2>8. Legislación aplicable y jurisdicción</h2>

  <p>El presente Aviso Legal se rige íntegramente por la legislación española.
  Para la resolución de cualquier controversia, conflicto o reclamación que
  pudiera derivarse del acceso, uso, navegación o contratación de servicios a
  través del sitio web, las partes se someten expresamente a los juzgados y
  tribunales de la ciudad de Madrid, con renuncia expresa a cualquier otro fuero
  que pudiera corresponderles.</p>

  <p>En caso de que el usuario tenga su domicilio fuera de España, Eleahora y el
  usuario se someten a los juzgados y tribunales de la ciudad de Madrid
  (España).</p>

  <p>Para la presentación de reclamaciones en línea, el usuario puede recurrir a
  la plataforma de resolución de litigios en línea de la Unión Europea,
  accesible en https://ec.europa.eu/consumers/odr/.</p>


  <h2>9. Contacto</h2>

  <p>Para cualquier consulta, incidencia o ejercicio de derechos relacionado con
