title: "politica-privacidad"
metaDescription: "Política de privacidad de Eleahora. Información sobre cómo tratamos tus datos personales conforme al RGPD."
lastUpdated: "2025-01-01"
content: >-
  **Responsable del tratamiento**

  Maria Eleonora Corallo
  Correo electrónico: info@eleahora.com

  **Finalidad del tratamiento**

  Los datos personales que nos proporcionas a través del formulario de contacto son tratados con la finalidad de gestionar tu solicitud, prestarte los servicios solicitados y mantenerte informado sobre nuestros servicios.

  **Legitimación**

  El tratamiento de tus datos se basa en tu consentimiento explícito al enviar el formulario de contacto.

  **Destinatarios**

  Tus datos no serán cedidos a terceros salvo obligación legal.

  **Derechos**

  Tienes derecho a acceder, rectificar y suprimir tus datos, así como otros derechos, como se explica en la información adicional. Puedes ejercer tus derechos escribiendo a info@eleahora.com.

  **Conservación de datos**

  Conservaremos tus datos durante el tiempo necesario para cumplir con la finalidad para la que se recabaron y para determinar las posibles responsabilidades que se pudieran derivar de dicha finalidad y del tratamiento de los datos.
