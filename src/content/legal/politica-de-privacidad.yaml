  - type: heading
    level: 2
    children:
      - text: '2. Datos recopilados'
  - type: paragraph
    children:
      - text: 'Nombre, email, teléfono (opcional) y mensaje del formulario de contacto.'
  - type: heading
    level: 2
    children:
      - text: '3. Base legal'
  - type: paragraph
    children:
      - text: 'Consentimiento (art. 6.1.a RGPD).'
  - type: heading
    level: 2
    children:
      - text: '4. Conservación'
  - type: paragraph
    children:
      - text: 'Tiempo necesario para gestionar la solicitud + tiempo legal.'
  - type: heading
    level: 2
    children:
      - text: '5. Derechos'
