title: politica-de-privacidad
metaDescription: >-
  Política de privacidad de Eleahora. Conoce cómo recopilamos, usamos,
  almacenamos y protegemos tus datos personales conforme al RGPD y la LOPDGDD.
  Tus derechos, medidas de seguridad y contacto.
lastUpdated: 2026-05-23
content: >-
  <h2>1. Responsable del tratamiento</h2>

  <p>En cumplimiento con el Reglamento (UE) 2016/679 del Parlamento Europeo y
  del Consejo, de 27 de abril de 2016, relativo a la protección de las personas
  físicas en lo que respecta al tratamiento de datos personales y a la libre
  circulación de estos datos (en adelante, «RGPD»), y la Ley Orgánica 3/2018, de
  5 de diciembre, de Protección de Datos Personales y garantía de los derechos
  digitales (LOPDGDD), se informa al usuario de los datos del responsable del
  tratamiento:</p>

  <p><strong>Responsable del tratamiento:</strong> Maria Eleonora Corallo</p>

  <p><strong>NIF / NIE:</strong> [A CONSULTAR]</p>

  <p><strong>Domicilio social:</strong> [A CONSULTAR] — Madrid, España</p>

  <p><strong>Correo electrónico de contacto DPO:</strong> info@eleahora.com</p>

  <p><strong>Teléfono / WhatsApp:</strong> +34 605 37 37 82</p>

  <p><strong>Sitio web:</strong> https://eleahora.com</p>

  <p>Eleahora no dispone de un Delegado de Protección de Datos (DPO) al no estar
  obligada a ello según los artículos 37 a 39 del RGPD. Para cualquier cuestión
  relacionada con el tratamiento de tus datos personales, puedes contactar
  directamente a través de info@eleahora.com.</p>


  <h2>2. Definiciones</h2>

  <p>A efectos de la presente Política de Privacidad, se entenderá por:</p>

  <ul>
    <li><strong>Dato personal:</strong> cualquier información sobre una persona física identificada o identificable («el interesado»).</li>
    <li><strong>Tratamiento:</strong> cualquier operación o conjunto de operaciones realizadas sobre datos personales, ya sea por procedimientos automatizados o no.</li>
    <li><strong>Responsable del tratamiento:</strong> la persona física o jurídica que determina los fines y medios del tratamiento.</li>
    <li><strong>Encargado del tratamiento:</strong> la persona física o jurídica que trata datos personales por cuenta del responsable del tratamiento.</li>
    <li><strong>Consentimiento del interesado:</strong> toda manifestación de voluntad libre, específica, informada e inequívoca por la que el interesado acepta el tratamiento de sus datos personales.</li>
  </ul>


  <h2>3. Datos personales recopilados y finalidad del tratamiento</h2>

  <p>En Eleahora tratamos únicamente los datos personales que nos proporcionas
  voluntariamente a través de los formularios de contacto del sitio web, la
  reserva de sesiones a través de Cal.com, la comunicación por WhatsApp, correo
  electrónico o cualquier otro medio habilitado. Los datos recopilados se
  limitan a los estrictamente necesarios para cada finalidad.</p>

  <h3>Categorías de datos recopilados</h3>

  <ul>
    <li><strong>Datos identificativos:</strong> nombre y apellidos.</li>
    <li><strong>Datos de contacto:</strong> dirección de correo electrónico, número de teléfono (proporcionado voluntariamente).</li>
    <li><strong>Datos de comunicación:</strong> información adicional que el usuario incluya voluntariamente en sus mensajes, consultas o comunicaciones (incluyendo el motivo de la consulta, área de interés o cualquier otra información que el usuario decida compartir).</li>
    <li><strong>Datos de navegación:</strong> dirección IP, tipo de navegador, sistema operativo, páginas visitadas, tiempo de visita y otras estadísticas de navegación recopiladas de forma anónima a través de Google Analytics (solo con consentimiento expreso).</li>
    <li><strong>Datos de sesión:</strong> información sobre las sesiones contratadas (fecha, hora, duración, modalidad) necesaria para la prestación del servicio.</li>
  </ul>

  <h3>Finalidades del tratamiento</h3>

  <p>Los datos personales recopilados se tratan exclusivamente para las
  siguientes finalidades:</p>

  <ol>
    <li><strong>Atención de consultas:</strong> gestionar y dar respuesta a las solicitudes de información o consultas realizadas a través del formulario de contacto, correo electrónico o WhatsApp.</li>
    <li><strong>Gestión de servicios:</strong> gestionar la reserva, coordinación, prestación y seguimiento de las sesiones y servicios contratados (terapia transpersonal, sesiones de PNL, meditación, talleres, perlas de Eleahora, sesiones energéticas).</li>
    <li><strong>Comunicaciones del servicio:</strong> enviar comunicaciones relacionadas con los servicios contratados, como confirmaciones, recordatorios, cambios de cita, facturación o información administrativa.</li>
    <li><strong>Comunicaciones comerciales (con consentimiento):</strong> con el consentimiento expreso y específico del usuario, enviar información periódica sobre novedades, artículos, meditaciones guiadas, promociones, talleres y eventos relacionados con Eleahora.</li>
    <li><strong>Mejora del sitio web:</strong> analizar el uso del sitio web de forma agregada y anónima para mejorar la experiencia del usuario y optimizar los contenidos (solo con consentimiento para cookies analíticas).</li>
    <li><strong>Cumplimiento legal:</strong> cumplir con las obligaciones legales, fiscales y administrativas derivadas de la prestación de servicios.</li>
  </ol>


  <h2>4. Base legal del tratamiento</h2>

  <p>El tratamiento de tus datos personales se fundamenta en las siguientes
  bases legales, conforme al artículo 6 del RGPD:</p>

  <ul>
    <li><strong>Consentimiento del interesado (artículo 6.1.a RGPD):</strong> cuando marcas la casilla de aceptación de la política de privacidad, aceptas el banner de cookies o nos envías voluntariamente tus datos a través de los formularios habilitados. Puedes retirar tu consentimiento en cualquier momento sin que ello afecte a la licitud del tratamiento basado en el consentimiento previo a su retirada.</li>
    <li><strong>Ejecución de un contrato o medidas precontractuales (artículo 6.1.b RGPD):</strong> cuando contratas los servicios profesionales de Eleahora (sesiones, talleres, formaciones), el tratamiento de tus datos es necesario para la ejecución del servicio contratado y para la aplicación de medidas precontractuales solicitadas por ti.</li>
    <li><strong>Cumplimiento de una obligación legal (artículo 6.1.c RGPD):</strong> para cumplir con obligaciones fiscales, contables, mercantiles y administrativas derivadas de la legislación española aplicable.</li>
    <li><strong>Interés legítimo (artículo 6.1.f RGPD):</strong> para garantizar la seguridad del sitio web, prevenir fraudes o abusos, y mejorar los servicios ofrecidos.</li>
  </ul>


  <h2>5. Conservación de los datos</h2>

  <p>Los datos personales proporcionados se conservarán durante el plazo
  estrictamente necesario para cumplir con la finalidad para la que fueron
  recabados, y mientras no se solicite su supresión por el interesado.</p>

  <p>Una vez finalizada la relación contractual o prestado el servicio, los
  datos podrán conservarse debidamente bloqueados durante los plazos legales de
  prescripción de las obligaciones:</p>

  <ul>
    <li><strong>Obligaciones fiscales y contables:</strong> 4 a 5 años (Ley General Tributaria y Código de Comercio).</li>
    <li><strong>Obligaciones derivadas de la relación contractual:</strong> 5 años (artículo 1964 del Código Civil).</li>
    <li><strong>Reclamaciones de responsabilidad civil o penal:</strong> hasta la prescripción de las acciones correspondientes.</li>
  </ul>

  <p>Transcurridos dichos plazos, los datos serán eliminados de forma segura y
  definitiva.</p>


  <h2>6. Derechos del interesado</h2>

  <p>El usuario puede ejercer en cualquier momento, de forma gratuita, los
  siguientes derechos reconocidos por los artículos 15 a 22 del RGPD:</p>

  <ul>
    <li><strong>Derecho de acceso (artículo 15 RGPD):</strong> a confirmar si estamos tratando tus datos personales y, en caso afirmativo, a acceder a dichos datos, conocer la finalidad del tratamiento, las categorías de datos, los destinatarios, el plazo de conservación y el origen de los datos.</li>
    <li><strong>Derecho de rectificación (artículo 16 RGPD):</strong> a solicitar la corrección de tus datos personales si son inexactos, erróneos o incompletos.</li>
    <li><strong>Derecho de supresión — «derecho al olvido» (artículo 17 RGPD):</strong> a solicitar la eliminación de tus datos personales cuando ya no sean necesarios para los fines para los que fueron recogidos, retires el consentimiento, te opongas al tratamiento, o hayan sido tratados ilícitamente.</li>
    <li><strong>Derecho a la limitación del tratamiento (artículo 18 RGPD):</strong> a solicitar que restrinjamos el procesamiento de tus datos en determinadas circunstancias, como cuando impugnes la exactitud de los datos o te hayas opuesto al tratamiento.</li>
    <li><strong>Derecho a la portabilidad de los datos (artículo 20 RGPD):</strong> a recibir tus datos personales en un formato estructurado, de uso común y lectura mecánica, y a transmitirlos a otro responsable del tratamiento cuando el tratamiento esté basado en el consentimiento o en un contrato y se realice por medios automatizados.</li>
    <li><strong>Derecho de oposición (artículo 21 RGPD):</strong> a oponerte al tratamiento de tus datos personales para fines específicos, incluida la elaboración de perfiles y el envío de comunicaciones comerciales. En caso de oposición al tratamiento para fines de marketing directo, los datos dejarán de ser tratados para dichos fines.</li>
    <li><strong>Derecho a no ser objeto de decisiones individuales automatizadas (artículo 22 RGPD):</strong> a no ser sometido a una decisión basada únicamente en el tratamiento automatizado, incluida la elaboración de perfiles, que produzca efectos jurídicos en ti o te afecte significativamente. Eleahora no realiza toma de decisiones automatizada con tus datos personales.</li>
  </ul>

  <p>Para ejercer cualquiera de estos derechos, el usuario debe enviar una
  solicitud expresa a la dirección de correo electrónico info@eleahora.com,
  indicando el derecho que desea ejercer y adjuntando una copia de su documento
  de identidad (DNI, NIE o pasaporte) en vigor para verificar su identidad, así
  como cualquier información que facilite la localización de sus datos.</p>

  <p>Eleahora responderá a la solicitud en el plazo máximo de un mes desde la
  recepción de la misma, prorrogable por otros dos meses en caso necesario
  teniendo en cuenta la complejidad y el número de solicitudes.</p>

  <p>Si el usuario no obtuviera respuesta satisfactoria o considerara vulnerados
  sus derechos, puede presentar una reclamación ante la Agencia Española de
  Protección de Datos (AEPD), sita en C/ Jorge Juan, 6, 28001 Madrid, o a través
  de su sede electrónica en www.aepd.es.</p>


  <h2>7. Destinatarios, cesión y encargados del tratamiento</h2>

  <p>Eleahora no cede, vende, alquila, traspasa ni comparte datos personales con
  terceros no vinculados a la prestación de los servicios, salvo obligación
  legal expresa o requerimiento de una autoridad competente.</p>

  <p>Para la correcta prestación de los servicios, Eleahora utiliza los
  siguientes encargados del tratamiento, que actúan bajo su instrucción directa
  y han suscrito el correspondiente contrato de encargo del tratamiento conforme
  al artículo 28 del RGPD:</p>

  <table>
    <tr><th>Proveedor</th><th>Servicio</th><th>Ubicación de los datos</th></tr>
    <tr><td>Vercel Inc.</td><td>Alojamiento web (hosting)</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
    <tr><td>Google LLC (Google Workspace)</td><td>Correo electrónico y almacenamiento</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
    <tr><td>Zoom Video Communications Inc.</td><td>Videollamadas para sesiones online</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
    <tr><td>Cal.com Inc.</td><td>Plataforma de reserva de citas</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
    <tr><td>WhatsApp LLC (Meta)</td><td>Comunicación con clientes</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
    <tr><td>Stripe Inc.</td><td>Procesamiento de pagos</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
    <tr><td>Google Analytics</td><td>Análisis de audiencia web</td><td>UE / EE. UU. (CCT aprobadas)</td></tr>
  </table>

  <p>No se realizan transferencias internacionales de datos personales a países
  fuera del Espacio Económico Europeo (EEE) que no ofrezcan un nivel de
  protección adecuado, salvo las inherentes a los proveedores mencionados, que
  en su caso cuentan con garantías adecuadas, como las Cláusulas Contractuales
  Tipo (CCT) aprobadas por la Comisión Europea (Decisión de Ejecución 2021/914),
  o el Escudo de Privacidad UE-EE. UU. (Data Privacy Framework) cuando resulte
  aplicable.</p>


  <h2>8. Medidas de seguridad</h2>

  <p>Eleahora adopta las medidas técnicas y organizativas necesarias para
  garantizar la seguridad, integridad, confidencialidad y disponibilidad de los
  datos personales, de acuerdo con el artículo 32 del RGPD y el Esquema Nacional
  de Seguridad (ENS) en lo que resulte aplicable. Estas medidas incluyen, entre
  otras:</p>

  <ul>
    <li><strong>Cifrado de las comunicaciones:</strong> el sitio web utiliza protocolo HTTPS con certificado SSL/TLS para garantizar que toda la información transmitida entre el navegador del usuario y el servidor viaje cifrada.</li>
    <li><strong>Almacenamiento seguro:</strong> los datos se almacenan en servidores seguros con controles de acceso restringido, firewalls y sistemas de detección de intrusiones.</li>
    <li><strong>Control de acceso:</strong> el acceso a los datos personales está limitado exclusivamente al personal autorizado y a los encargados del tratamiento que actúan bajo instrucción de Eleahora.</li>
    <li><strong>Copias de seguridad:</strong> se realizan copias de seguridad periódicas para garantizar la recuperación de los datos en caso de incidente.</li>
    <li><strong>Formación y concienciación:</strong> Eleahora se compromete a mantener prácticas de protección de datos actualizadas y a formar a las personas involucradas en el tratamiento.</li>
  </ul>

  <p>A pesar de estas medidas, ninguna transmisión de datos a través de internet
  o sistema de almacenamiento electrónico puede garantizarse como completamente
  segura. Eleahora no puede garantizar la seguridad absoluta de la información
  transmitida a través del sitio web.</p>


  <h2>9. Redes sociales</h2>

  <p>Eleahora tiene presencia activa en las siguientes redes sociales y
  plataformas: Instagram, LinkedIn, Insight Timer y Facebook.</p>

  <p>El tratamiento de los datos personales de los usuarios que siguen,
  interactúan o se ponen en contacto a través de dichas plataformas se rige por
  las políticas de privacidad y condiciones de uso de cada red social, que el
  usuario debe haber aceptado al registrarse en las mismas. Eleahora no se
  responsabiliza del tratamiento de datos que realicen dichas plataformas como
  responsables autónomos del tratamiento.</p>

  <p>Cuando Eleahora accede a los datos de los usuarios a través de estas
  plataformas (como nombre de usuario, comentarios públicos o mensajes
  directos), los tratará exclusivamente para gestionar las interacciones,
  responder a consultas y, en su caso, derivar a los canales de comunicación
  privados para la contratación de servicios. En ningún caso Eleahora extrae
  datos de las plataformas para fines no consentidos.</p>


  <h2>10. Cookies y tecnologías de seguimiento</h2>

  <p>Este sitio web utiliza cookies propias y de terceros para garantizar su
  correcto funcionamiento, mejorar la experiencia del usuario y analizar el
  tráfico de forma agregada y anónima. Para obtener información detallada sobre
  los tipos de cookies utilizadas, su finalidad, duración y cómo gestionarlas,
  consulta nuestra <a href="/legal/politica-de-cookies">Política de
  Cookies</a>.</p>

  <p>Las cookies de terceros (analíticas) solo se cargarán después de que hayas
  otorgado tu consentimiento expreso a través del banner de cookies. Puedes
  retirar tu consentimiento en cualquier momento.</p>


  <h2>11. Tratamiento de datos de menores</h2>

  <p>El sitio web de Eleahora se dirige exclusivamente a mayores de 18 años. No
  recopilamos ni tratamos de forma consciente datos personales de menores de
  edad. Si tenemos conocimiento de que se han recopilado datos personales de un
  menor sin el consentimiento verificable de sus padres o tutores legales,
  procederemos a su eliminación inmediata.</p>

  <p>Si eres padre, madre o tutor legal y tienes motivos para creer que tu hijo
  o tutelado nos ha proporcionado datos personales sin tu consentimiento, por
  favor contacta con nosotros a través de info@eleahora.com para que podamos
  eliminar dicha información.</p>


  <h2>12. Exactitud y veracidad de los datos</h2>

  <p>El usuario es el único responsable de la veracidad y exactitud de los datos
  personales proporcionados a Eleahora. El usuario garantiza y se responsabiliza
  de que todos los datos facilitados son verdaderos, exactos, actuales y
  completos, y se compromete a mantenerlos debidamente actualizados.</p>

  <p>Eleahora se reserva el derecho a excluir de los servicios a cualquier
  usuario que haya proporcionado datos falsos, sin perjuicio de otras acciones
  legales que pudieran corresponder.</p>


  <h2>13. Secreto profesional y confidencialidad</h2>

  <p>Los datos personales y la información compartida por el usuario en el
  contexto de las sesiones de acompañamiento terapéutico, meditación o cualquier
  otro servicio de Eleahora están sujetos al deber de secreto profesional y
  confidencialidad. Eleahora se compromete a:</p>

  <ul>
    <li>Mantener la más estricta confidencialidad sobre toda la información compartida por el usuario en el contexto de los servicios prestados.</li>
    <li>No divulgar ni compartir dicha información con terceros, salvo obligación legal o consentimiento expreso del usuario.</li>
    <li>Utilizar la información exclusivamente para los fines terapéuticos o de acompañamiento acordados.</li>
  </ul>

  <p>Este deber de confidencialidad se mantendrá incluso después de finalizada
  la relación profesional con el usuario.</p>


  <h2>14. Actualizaciones de esta política de privacidad</h2>

  <p>Eleahora se reserva el derecho a modificar la presente Política de
  Privacidad para adaptarla a cambios normativos, jurisprudenciales, técnicos o
  de organización interna. Las modificaciones se publicarán en el sitio web con
  la fecha de la última actualización indicada al inicio del documento.</p>

  <p>Se recomienda al usuario revisar periódicamente esta Política de Privacidad
  para estar informado de cómo se protegen sus datos personales. El uso
  continuado del sitio web después de la publicación de cambios implicará la
  aceptación de dichas modificaciones.</p>


  <h2>15. Contacto</h2>

  <p>Para cualquier consulta, aclaración o ejercicio de derechos relacionados
  con la protección de tus datos personales, puedes contactar con Eleahora a
  través de:</p>

  <p><strong>Correo electrónico:</strong> info@eleahora.com<br><strong>Teléfono
  / WhatsApp:</strong> +34 605 37 37 82</p>

  <p>Te responderemos en el plazo más breve posible y, en todo caso, dentro del
  plazo legal establecido.</p>
