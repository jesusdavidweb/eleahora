title: Política de Privacidad
metaDescription: >-
  Política de privacidad de Eleahora. Conoce cómo recopilamos, usamos y
  protegemos tus datos personales conforme al RGPD.
lastUpdated: '2025-01-01'
content:
  - type: heading
    level: 2
    children:
      - text: 1. Responsable del tratamiento
  - type: paragraph
    children:
      - text: 'Titular: Maria Eleonora Corallo'
  - type: paragraph
    children:
      - text: 'Actividad: Terapia Transpersonal y Meditación'
  - type: paragraph
    children:
      - text: 'Email: '
      - text: info@eleahora.com
        bold: false
  - type: heading
    level: 2
    children:
      - text: 2. Datos que recopilamos
  - type: paragraph
    children:
      - text: >-
          A través del formulario de contacto recopilamos nombre, email,
          teléfono (opcional) y el contenido del mensaje. Estos datos se usan
          exclusivamente para responder tu solicitud y ofrecerte información
          sobre los servicios de Eleahora.
  - type: heading
    level: 2
    children:
      - text: 3. Base legal del tratamiento
  - type: paragraph
    children:
      - text: >-
          El tratamiento de tus datos se basa en el consentimiento otorgado al
          enviar el formulario (art. 6.1.a RGPD).
  - type: heading
    level: 2
    children:
      - text: 4. Conservación de datos
  - type: paragraph
    children:
      - text: >-
          Conservamos tus datos durante el tiempo necesario para gestionar tu
          solicitud y, en su caso, el tiempo legalmente requerido.
  - type: heading
    level: 2
    children:
      - text: 5. Tus derechos
  - type: paragraph
    children:
      - text: >-
          Puedes ejercer tus derechos de acceso, rectificación, supresión,
          limitación, portabilidad y oposición escribiendo a
          info@eleahora.com. También puedes presentar una reclamación ante la
          Agencia Española de Protección de Datos (aepd.es).
  - type: heading
    level: 2
    children:
      - text: 6. Cookies
  - type: paragraph
    children:
      - text: >-
          Este sitio usa cookies propias y de terceros. Consulta nuestra
          Política de Cookies para más información.
