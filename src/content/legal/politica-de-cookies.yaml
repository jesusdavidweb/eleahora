title: politica-de-cookies
metaDescription: >-
  Política de cookies de Eleahora. Información completa sobre los tipos de
  cookies utilizadas, su finalidad, duración y cómo gestionar tus preferencias
  de privacidad.
lastUpdated: '2026-05-23'
content: |-
  <h2>1. ¿Qué son las cookies?</h2>
  <p>Las cookies son pequeños archivos de texto que se almacenan en tu navegador (ordenador, tableta o smartphone) cuando visitas un sitio web. Contienen información anónima que permite recordar tus preferencias de navegación, mejorar tu experiencia como usuario y, en algunos casos, obtener información estadística sobre el comportamiento de los visitantes.</p>
  <p>Existen otros tipos de tecnologías de almacenamiento similares, como los píxeles de seguimiento, las balizas web, los archivos Flash Local Shared Objects y el almacenamiento local HTML5, que pueden utilizarse con fines equivalentes.</p>
  <p>En Eleahora utilizamos cookies propias y de terceros para garantizar el correcto funcionamiento del sitio web y analizar el tráfico de forma agregada y anónima. Este sitio web no utiliza cookies de publicidad comportamental ni de remarketing.</p>

  <h2>2. Tipos de cookies según su finalidad</h2>
  <p>Las cookies pueden clasificarse según diferentes criterios. A continuación, explicamos los tipos de cookies que se utilizan en este sitio web en función de su finalidad:</p>
  <h3>2.1 Cookies técnicas o necesarias</h3>
  <p>Son aquellas que permiten al usuario la navegación a través del sitio web y la utilización de las diferentes opciones o servicios que en él existen. Sin estas cookies, el sitio web no podría funcionar correctamente. No requieren consentimiento previo del usuario.</p>
  <h3>2.2 Cookies de preferencias o personalización</h3>
  <p>Permiten recordar información para que el usuario acceda al servicio con características predefinidas que diferencian su experiencia de la de otros usuarios, como el idioma, el tipo de navegador o la configuración regional. En este sitio web se utiliza una cookie funcional para recordar tu preferencia de consentimiento de cookies.</p>
  <h3>2.3 Cookies de análisis o medición</h3>
  <p>Permiten cuantificar el número de usuarios y realizar la medición y análisis estadístico del uso que los usuarios hacen del sitio web, con el fin de introducir mejoras en función de los datos de uso. Estas cookies solo se activan con tu consentimiento expreso.</p>

  <h2>3. Cookies utilizadas en este sitio web</h2>
  <p>A continuación, se detallan todas las cookies que se utilizan en eleahora.com, su finalidad, origen y duración:</p>
  <table>
    <tr><th>Cookie</th><th>Tipo</th><th>Origen</th><th>Finalidad</th><th>Duración</th></tr>
    <tr>
      <td><strong>cookieconsent</strong></td>
      <td>Técnica / Funcional</td>
      <td>Propia (Eleahora)</td>
      <td>Almacena la preferencia de consentimiento de cookies del usuario para no volver a mostrar el banner en visitas sucesivas.</td>
      <td>1 año</td>
    </tr>
    <tr>
      <td><strong>_ga</strong></td>
      <td>Analítica</td>
      <td>Tercero (Google Analytics)</td>
      <td>Identifica a los usuarios de forma anónima. Se utiliza para distinguir usuarios únicos y calcular datos de visitantes, sesiones y campañas.</td>
      <td>2 años</td>
    </tr>
    <tr>
      <td><strong>_ga_&lt;container-id&gt;</strong></td>
      <td>Analítica</td>
      <td>Tercero (Google Analytics)</td>
      <td>Identifica la sesión del usuario. Se utiliza para mantener el estado de la sesión y rastrear las interacciones del usuario dentro de una misma visita.</td>
      <td>2 años</td>
    </tr>
    <tr>
      <td><strong>_gid</strong></td>
      <td>Analítica</td>
      <td>Tercero (Google Analytics)</td>
      <td>Identifica a los usuarios de forma anónima. Se utiliza para distinguir usuarios únicos y generar estadísticas de uso.</td>
      <td>24 horas</td>
    </tr>
    <tr>
      <td><strong>_gat_gtag_*</strong></td>
      <td>Analítica</td>
      <td>Tercero (Google Analytics)</td>
      <td>Limita la tasa de solicitudes. Se utiliza para controlar el volumen de peticiones y mejorar el rendimiento del sitio.</td>
      <td>1 minuto</td>
    </tr>
  </table>

  <h2>4. Cookies de terceros</h2>
  <p>Este sitio web utiliza Google Analytics, un servicio de análisis web prestado por Google LLC (1600 Amphitheatre Parkway, Mountain View, CA 94043, EE. UU.) y/o Google Ireland Limited (Gordon House, Barrow Street, Dublín 4, Irlanda) para los usuarios en el Espacio Económico Europeo.</p>
  <p>Google Analytics utiliza cookies para analizar el uso del sitio web de forma anónima y generar informes sobre las tendencias de navegación, el número de visitantes, las páginas más visitadas, el tiempo de permanencia y el origen del tráfico. Google puede tratar estos datos conforme a su política de privacidad, disponible en policies.google.com/privacy.</p>
  <p>Google Analytics está configurado en modo anonimizado de IP, por lo que tu dirección IP se trunca antes de ser enviada a los servidores de Google, impidiendo su identificación directa.</p>
  <p>Las cookies de Google Analytics solo se cargarán después de que hayas aceptado expresamente el uso de cookies a través del banner de consentimiento. Puedes obtener más información sobre las cookies de Google Analytics en developers.google.com/analytics/devguides/collection/analyticsjs/cookie-usage.</p>

  <h2>5. Consentimiento y gestión de preferencias</h2>
  <p>Al acceder por primera vez a este sitio web, se muestra un banner informativo sobre el uso de cookies que te permite tomar una decisión informada:</p>
  <ul>
    <li><strong>«Aceptar todas»:</strong> al hacer clic en este botón, consientes el uso de todas las cookies descritas en esta política, incluyendo las cookies analíticas de Google Analytics.</li>
    <li><strong>«Solo necesarias»:</strong> al hacer clic en este botón, solo se almacenarán las cookies estrictamente funcionales y técnicas necesarias para el correcto funcionamiento del sitio web (como la cookie que guarda tu preferencia de consentimiento). Las cookies analíticas no se cargarán.</li>
  </ul>
  <p>El consentimiento se almacena en la cookie funcional «cookieconsent» con una validez de 1 año. Transcurrido ese período, o si borras las cookies de tu navegador, se te volverá a solicitar el consentimiento en tu próxima visita.</p>
  <p>Podrás retirar tu consentimiento en cualquier momento eliminando las cookies de tu navegador según las instrucciones del apartado siguiente, o bloqueando las cookies de terceros desde la configuración de tu navegador.</p>

  <h2>6. Gestión y desactivación de cookies en el navegador</h2>
  <p>Puedes permitir, bloquear, restringir o eliminar las cookies instaladas en tu dispositivo mediante la configuración de tu navegador. A continuación, te indicamos cómo acceder a la configuración de cookies en los navegadores más utilizados:</p>
  <h3>Google Chrome</h3>
  <p>Menú &gt; Configuración &gt; Privacidad y seguridad &gt; Cookies y otros datos de sitios. Puedes elegir entre permitir cookies, bloquear cookies de terceros, bloquear todas las cookies o eliminar cookies específicas. Más información en support.google.com/chrome/answer/95647.</p>
  <h3>Mozilla Firefox</h3>
  <p>Menú &gt; Opciones &gt; Privacidad y seguridad &gt; Cookies y datos del sitio. Puedes configurar el nivel de protección contra el rastreo, gestionar excepciones y eliminar cookies individuales. Más información en support.mozilla.org/es/kb/Limpiar-cookies.</p>
  <h3>Safari</h3>
  <p>Preferencias &gt; Privacidad &gt; Cookies y datos de sitios web. Puedes bloquear todas las cookies, permitirlas siempre, o gestionar las cookies almacenadas. Más información en support.apple.com/es-es/guide/safari/sfri11471.</p>
  <h3>Microsoft Edge</h3>
  <p>Menú &gt; Configuración &gt; Permisos del sitio &gt; Cookies y datos almacenados. Puedes permitir o bloquear cookies, y gestionar las cookies almacenadas por sitio. Más información en support.microsoft.com/es-es/help/4468242.</p>
  <h3>Opera</h3>
  <p>Menú &gt; Configuración &gt; Avanzado &gt; Privacidad y seguridad &gt; Cookies. Puedes gestionar las preferencias de cookies desde esta sección.</p>
  <p>También puedes gestionar las cookies de Google Analytics de forma específica a través del complemento de inhabilitación para navegadores disponible en tools.google.com/dlpage/gaoptout.</p>
  <p>Ten en cuenta que si rechazas, bloqueas o eliminas las cookies técnicas o funcionales, es posible que algunas funcionalidades del sitio web no funcionen correctamente o que tu experiencia de navegación se vea afectada.</p>

  <h2>7. Base legal del uso de cookies</h2>
  <p>La base legal que legitima el uso de cookies en este sitio web es:</p>
  <ul>
    <li><strong>Cookies técnicas y funcionales:</strong> artículo 22.2 de la Ley 34/2002, de 11 de julio, de Servicios de la Sociedad de la Información y de Comercio Electrónico (LSSI), que exceptúa del requisito de consentimiento informado a aquellas cookies que sean estrictamente necesarias para la prestación del servicio solicitado por el usuario.</li>
    <li><strong>Cookies analíticas y de terceros:</strong> consentimiento expreso e informado del usuario, otorgado a través del banner de cookies, conforme al artículo 22.1 de la LSSI y al artículo 6.1.a del RGPD.</li>
  </ul>

  <h2>8. Actualizaciones de esta política de cookies</h2>
  <p>Esta Política de Cookies puede actualizarse periódicamente para reflejar cambios en las cookies utilizadas, en los servicios de terceros empleados, o en los requisitos legales y normativos aplicables. Se recomienda al usuario revisar esta página cada cierto tiempo para estar informado de cualquier modificación.</p>
  <p>La fecha de la última actualización se indica al inicio de este documento. Las modificaciones sustanciales en el tratamiento de cookies serán comunicadas al usuario a través del banner de cookies o mediante aviso en el sitio web.</p>

  <h2>9. Contacto</h2>
  <p>Si tienes cualquier duda, pregunta o solicitud relacionada con el uso de cookies en este sitio web, puedes ponerte en contacto con Eleahora a través de los siguientes canales:</p>
  <p><strong>Correo electrónico:</strong> info@eleahora.com<br><strong>Teléfono / WhatsApp:</strong> +34 605 37 37 82</p>
  <p>Estaremos encantados de atenderte y resolver cualquier cuestión que pueda surgirte.</p>
